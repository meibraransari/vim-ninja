# ─────────────────────────────────────────────────────────
# tmux.conf — VimNinja Sandbox
# ─────────────────────────────────────────────────────────

# Change prefix to Ctrl+a (like screen — easier to reach)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# 256 colors
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Faster key repetition
set -s escape-time 0

# Increase history
set -g history-limit 10000

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Vi mode for copy
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar ─────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-bg colour235
set -g status-fg colour136

set -g status-left-length 30
set -g status-right-length 60
set -g status-left  "#[fg=colour166,bold]⚡ VimNinja #[fg=colour244]| "
set -g status-right "#[fg=colour244]%H:%M #[fg=colour166]| #[fg=colour244]%d %b"

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W "
setw -g window-status-current-style  "fg=colour166,bold"
